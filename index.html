<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DualView</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #c8f542;
    --text: #e8e8f0;
    --muted: #555570;
    --gap: 10px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

  /* ── SETUP ── */
  #setup {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; padding: 24px; gap: 22px; animation: fadeIn .4s ease;
  }
  .logo { font-size: 13px; font-family: 'Space Mono', monospace; letter-spacing: .25em; color: var(--accent); text-transform: uppercase; }
  h1 { font-size: clamp(26px, 7vw, 48px); font-weight: 800; line-height: 1.05; text-align: center; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--muted); text-align: center; max-width: 320px; line-height: 1.6; }

  .form-block { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
  .field-label { font-size: 11px; font-family: 'Space Mono', monospace; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
  .field-wrap { display: flex; flex-direction: column; gap: 4px; }
  .tag { font-size: 10px; font-family: 'Space Mono', monospace; padding: 2px 6px; border-radius: 3px; align-self: flex-start; }
  .tag-mp4 { background: #c8f54218; color: var(--accent); border: 1px solid #c8f54240; }
  .tag-yt  { background: #f5424218; color: #f54242; border: 1px solid #f5424240; }

  input[type="text"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px;
    padding: 12px 14px; border-radius: 8px; outline: none; transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .layout-toggle { display: flex; gap: 8px; }
  .layout-btn {
    flex: 1; padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .layout-btn.active { border-color: var(--accent); color: var(--accent); background: #c8f54210; }

  .go-btn {
    width: 100%; padding: 15px; border-radius: 10px; border: none;
    background: var(--accent); color: #0a0a0f; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: .05em; cursor: pointer;
    transition: transform .15s, opacity .15s; margin-top: 4px;
  }
  .go-btn:active { transform: scale(.97); opacity: .85; }
  .error-msg { font-size: 12px; font-family: 'Space Mono', monospace; color: #f54242; text-align: center; min-height: 16px; }

  /* ── PLAYER ── */
  #player { display: none; width: 100vw; height: 100vh; flex-direction: column; background: var(--bg); }
  #player.active { display: flex; }

  .topbar {
    height: 40px; flex-shrink: 0; display: flex; align-items: center;
    justify-content: space-between; padding: 0 12px;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .topbar-logo { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: .2em; color: var(--accent); }
  .back-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 10px; padding: 4px 10px;
    border-radius: 5px; cursor: pointer; transition: border-color .2s, color .2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  #videos {
    flex: 1; display: flex; padding: var(--gap); gap: var(--gap); overflow: hidden; min-height: 0;
  }
  #videos.layout-h { flex-direction: row; }
  #videos.layout-v { flex-direction: column; }

  .vid-slot {
    flex: 1; position: relative; background: #000;
    border-radius: 10px; overflow: hidden; border: 1px solid var(--border); min-height: 0;
  }
  .vid-label {
    position: absolute; top: 8px; left: 8px; z-index: 10;
    font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .1em;
    padding: 3px 7px; border-radius: 4px; pointer-events: none;
  }
  .label-mp4 { background: #c8f54230; color: var(--accent); border: 1px solid #c8f54250; }
  .label-yt  { background: #f5424230; color: #f54242; border: 1px solid #f5424250; }

  .vid-slot video, .vid-slot iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: none;
  }

  .swap-btn {
    z-index: 20; background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    transition: color .2s, border-color .2s; flex-shrink: 0; align-self: center;
  }
  .swap-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── CONTROLS BAR ── */
  .controls {
    flex-shrink: 0; height: 52px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--surface); border-top: 1px solid var(--border); padding: 0 14px;
  }

  .play-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: var(--accent); color: #0a0a0f;
    font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .15s, opacity .15s; flex-shrink: 0;
  }
  .play-btn:active { transform: scale(.93); opacity: .8; }

  .time-group {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 8px;
  }
  .time-tag { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .08em; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
  .time-tag-mp4 { color: var(--accent); }
  .time-tag-yt  { color: #f54242; }

  input.time-input {
    width: 62px; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px;
    padding: 0; text-align: center;
  }
  input.time-input::placeholder { color: var(--muted); }

  .seek-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 9px;
    padding: 3px 7px; border-radius: 5px; cursor: pointer;
    transition: border-color .2s, color .2s; white-space: nowrap;
  }
  .seek-btn:hover { border-color: var(--accent); color: var(--accent); }

  .divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 540px) {
    .controls { gap: 6px; padding: 0 8px; height: 56px; }
    input.time-input { width: 52px; }
    #videos { --gap: 6px; }
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">DualView</div>
  <h1>Два видео.<br><span>Один экран.</span></h1>
  <p class="subtitle">MP4-ссылка + YouTube одновременно</p>

  <div class="form-block">
    <div class="field-wrap">
      <span class="field-label">Первое видео</span>
      <span class="tag tag-mp4">MP4 / прямая ссылка</span>
      <input type="text" id="mp4url" placeholder="https://video.org/mojqs.mp4" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field-wrap">
      <span class="field-label">Второе видео</span>
      <span class="tag tag-yt">YouTube</span>
      <input type="text" id="yturl" placeholder="https://youtube.com/watch?v=... или ID" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field-wrap">
      <span class="field-label">Расположение</span>
      <div class="layout-toggle">
        <button class="layout-btn active" data-layout="h" onclick="selectLayout(this)">◫◫ Рядом</button>
        <button class="layout-btn" data-layout="v" onclick="selectLayout(this)">⬒ Сверху/снизу</button>
      </div>
    </div>
    <div class="error-msg" id="err"></div>
    <button class="go-btn" onclick="launch()">Запустить →</button>
  </div>
</div>

<!-- PLAYER -->
<div id="player">
  <div class="topbar">
    <span class="topbar-logo">DUALVIEW</span>
    <button class="back-btn" onclick="goBack()">← Назад</button>
  </div>

  <div id="videos" class="layout-h"></div>

  <div class="controls">
    <div class="time-group">
      <span class="time-tag time-tag-mp4">MP4</span>
      <input class="time-input" id="mp4-time" placeholder="0:00" title="м:сс или секунды">
      <button class="seek-btn" onclick="seekMp4()">→</button>
    </div>

    <div class="divider"></div>

    <button class="play-btn" id="play-btn" onclick="togglePlay()" title="Пауза / Воспроизведение (пробел)">▶</button>

    <div class="divider"></div>

    <div class="time-group">
      <span class="time-tag time-tag-yt">YT</span>
      <input class="time-input" id="yt-time" placeholder="0:00" title="м:сс или секунды">
      <button class="seek-btn" onclick="seekYt()">→</button>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  let chosenLayout = 'h';
  let ytPlayer = null;
  let mp4El = null;
  let isPlaying = false;

  function onYouTubeIframeAPIReady() {
    // will be called by YT script; player created in launch()
  }

  function selectLayout(btn) {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chosenLayout = btn.dataset.layout;
  }

  function extractYtId(input) {
    input = input.trim();
    if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
    try {
      const url = new URL(input);
      if (url.hostname.includes('youtu.be')) return url.pathname.slice(1);
      if (url.searchParams.get('v')) return url.searchParams.get('v');
      const m = url.pathname.match(/\/(shorts|embed|v)\/([A-Za-z0-9_-]{11})/);
      if (m) return m[2];
    } catch {}
    return null;
  }

  function parseTime(str) {
    str = (str || '').trim();
    if (!str) return null;
    if (str.includes(':')) {
      const parts = str.split(':').map(Number);
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    }
    const n = parseFloat(str);
    return isNaN(n) ? null : n;
  }

  function launch() {
    const mp4 = document.getElementById('mp4url').value.trim();
    const yt  = document.getElementById('yturl').value.trim();
    const err = document.getElementById('err');

    if (!mp4) { err.textContent = 'Введите MP4-ссылку'; return; }
    if (!yt)  { err.textContent = 'Введите YouTube-ссылку или ID'; return; }
    const ytId = extractYtId(yt);
    if (!ytId) { err.textContent = 'Не удалось распознать YouTube ID'; return; }

    err.textContent = '';
    isPlaying = false;
    updatePlayBtn();

    const container = document.getElementById('videos');
    container.className = 'layout-' + chosenLayout;
    container.innerHTML = `
      <div class="vid-slot" id="slot-a">
        <span class="vid-label label-mp4">MP4</span>
        <video id="mp4-video" src="${escHtml(mp4)}" playsinline></video>
      </div>
      <button class="swap-btn" title="Поменять местами" onclick="swapSlots()">⇄</button>
      <div class="vid-slot" id="slot-b">
        <span class="vid-label label-yt">YOUTUBE</span>
        <div id="yt-player-div" style="position:absolute;inset:0;width:100%;height:100%;"></div>
      </div>
    `;

    mp4El = document.getElementById('mp4-video');

    // Destroy previous YT player if exists
    if (ytPlayer) { try { ytPlayer.destroy(); } catch(e){} ytPlayer = null; }

    // Create new YT player via IFrame API
    ytPlayer = new YT.Player('yt-player-div', {
      videoId: ytId,
      playerVars: { rel: 0, modestbranding: 1, enablejsapi: 1 },
      width: '100%',
      height: '100%',
      events: {
        onReady: (e) => {
          ytPlayer = e.target;
          // Make iframe fill slot
          const iframe = document.querySelector('#slot-b iframe');
          if (iframe) {
            iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
          }
        }
      }
    });

    document.getElementById('setup').style.display = 'none';
    document.getElementById('player').classList.add('active');
  }

  function togglePlay() {
    isPlaying = !isPlaying;
    if (mp4El) isPlaying ? mp4El.play() : mp4El.pause();
    if (ytPlayer && ytPlayer.playVideo) isPlaying ? ytPlayer.playVideo() : ytPlayer.pauseVideo();
    updatePlayBtn();
  }

  function updatePlayBtn() {
    const btn = document.getElementById('play-btn');
    if (btn) btn.textContent = isPlaying ? '⏸' : '▶';
  }

  function seekMp4() {
    const t = parseTime(document.getElementById('mp4-time').value);
    if (t !== null && mp4El) mp4El.currentTime = t;
  }

  function seekYt() {
    const t = parseTime(document.getElementById('yt-time').value);
    if (t !== null && ytPlayer && ytPlayer.seekTo) ytPlayer.seekTo(t, true);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') {
      if (e.key === 'Enter') {
        if (e.target.id === 'mp4-time') seekMp4();
        if (e.target.id === 'yt-time')  seekYt();
      }
      return;
    }
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  });

  function swapSlots() {
    const container = document.getElementById('videos');
    const a = document.getElementById('slot-a');
    const b = document.getElementById('slot-b');
    const swapBtn = container.querySelector('.swap-btn');
    container.insertBefore(b, swapBtn);
    container.appendChild(a);
    b.id = 'slot-a'; a.id = 'slot-b';
    const labelA = b.querySelector('.vid-label');
    const labelB = a.querySelector('.vid-label');
    [labelA.className, labelB.className] = [labelB.className, labelA.className];
    [labelA.textContent, labelB.textContent] = [labelB.textContent, labelA.textContent];
  }

  function goBack() {
    if (ytPlayer) { try { ytPlayer.destroy(); } catch(e){} ytPlayer = null; }
    if (mp4El) { mp4El.pause(); mp4El = null; }
    isPlaying = false;
    document.getElementById('player').classList.remove('active');
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('videos').innerHTML = '';
    document.getElementById('mp4-time').value = '';
    document.getElementById('yt-time').value = '';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
