<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DualView</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #c8f542;
    --accent2: #42c8f5;
    --text: #e8e8f0;
    --muted: #555570;
    --gap: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  /* ── SETUP SCREEN ── */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 24px;
    gap: 28px;
    background: var(--bg);
    animation: fadeIn .4s ease;
  }

  .logo {
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    letter-spacing: .25em;
    color: var(--accent);
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(28px, 8vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    text-align: center;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    max-width: 320px;
    line-height: 1.6;
  }

  .form-block {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: .15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .field-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .tag {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    align-self: flex-start;
  }
  .tag-mp4 { background: #c8f54218; color: var(--accent); border: 1px solid #c8f54240; }
  .tag-yt  { background: #f5424218; color: #f54242; border: 1px solid #f5424240; }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  /* layout toggle */
  .layout-toggle {
    display: flex;
    gap: 8px;
  }

  .layout-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .layout-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: #c8f54210;
  }

  .go-btn {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .05em;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    margin-top: 4px;
  }
  .go-btn:active { transform: scale(.97); opacity: .85; }

  .error-msg {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: #f54242;
    text-align: center;
    min-height: 16px;
  }

  /* ── PLAYER SCREEN ── */
  #player {
    display: none;
    width: 100vw;
    height: 100vh;
    flex-direction: column;
    background: var(--bg);
  }
  #player.active { display: flex; }

  /* top bar */
  .topbar {
    height: 40px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .topbar-logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--accent);
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* video area */
  #videos {
    flex: 1;
    display: flex;
    padding: var(--gap);
    gap: var(--gap);
    overflow: hidden;
  }

  /* horizontal = side by side */
  #videos.layout-h { flex-direction: row; }
  /* vertical = top/bottom */
  #videos.layout-v { flex-direction: column; }

  .vid-slot {
    flex: 1;
    position: relative;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .vid-label {
    position: absolute;
    top: 8px;
    left: 8px;
    z-index: 10;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: .1em;
    padding: 3px 7px;
    border-radius: 4px;
    pointer-events: none;
  }
  .label-mp4 { background: #c8f54230; color: var(--accent); border: 1px solid #c8f54250; }
  .label-yt  { background: #f5424230; color: #f54242; border: 1px solid #f5424250; }

  .vid-slot video,
  .vid-slot iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* swap button */
  .swap-btn {
    position: absolute;
    /* sits between the two panels */
    z-index: 20;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: color .2s, border-color .2s;
    flex-shrink: 0;
    align-self: center;
  }
  .swap-btn:hover { color: var(--accent); border-color: var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* mobile adjustments */
  @media (max-width: 500px) {
    #videos { --gap: 6px; }
    .topbar { height: 36px; }
  }
</style>
</head>
<body>

<!-- ── SETUP ── -->
<div id="setup">
  <div class="logo">DualView</div>
  <h1>Два видео.<br><span>Один экран.</span></h1>
  <p class="subtitle">MP4-ссылка + YouTube одновременно — реакция и источник рядом</p>

  <div class="form-block">
    <div class="field-wrap">
      <span class="field-label">Первое видео</span>
      <span class="tag tag-mp4">MP4 / прямая ссылка</span>
      <input type="text" id="mp4url" placeholder="https://video.org/mojqs.mp4" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <div class="field-wrap">
      <span class="field-label">Второе видео</span>
      <span class="tag tag-yt">YouTube</span>
      <input type="text" id="yturl" placeholder="https://youtube.com/watch?v=... или ID" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <div class="field-wrap">
      <span class="field-label">Расположение</span>
      <div class="layout-toggle">
        <button class="layout-btn active" data-layout="h" onclick="selectLayout(this)">
          <span>◫◫</span> Рядом
        </button>
        <button class="layout-btn" data-layout="v" onclick="selectLayout(this)">
          <span>⬒</span> Сверху/снизу
        </button>
      </div>
    </div>

    <div class="error-msg" id="err"></div>
    <button class="go-btn" onclick="launch()">Запустить →</button>
  </div>
</div>

<!-- ── PLAYER ── -->
<div id="player">
  <div class="topbar">
    <span class="topbar-logo">DUALVIEW</span>
    <button class="back-btn" onclick="goBack()">← Назад</button>
  </div>

  <div id="videos" class="layout-h">
    <!-- filled by JS -->
  </div>
</div>

<script>
  let chosenLayout = 'h';

  function selectLayout(btn) {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chosenLayout = btn.dataset.layout;
  }

  function extractYtId(input) {
    input = input.trim();
    // already an ID (11 chars, no slash)
    if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
    try {
      const url = new URL(input);
      if (url.hostname.includes('youtu.be')) return url.pathname.slice(1);
      if (url.searchParams.get('v'))         return url.searchParams.get('v');
      // shorts
      const m = url.pathname.match(/\/(shorts|embed|v)\/([A-Za-z0-9_-]{11})/);
      if (m) return m[2];
    } catch {}
    return null;
  }

  function launch() {
    const mp4 = document.getElementById('mp4url').value.trim();
    const yt  = document.getElementById('yturl').value.trim();
    const err = document.getElementById('err');

    if (!mp4) { err.textContent = 'Введите MP4-ссылку'; return; }
    if (!yt)  { err.textContent = 'Введите YouTube-ссылку или ID'; return; }

    const ytId = extractYtId(yt);
    if (!ytId) { err.textContent = 'Не удалось распознать YouTube ID'; return; }

    err.textContent = '';

    const container = document.getElementById('videos');
    container.className = 'layout-' + chosenLayout;

    // build slots
    container.innerHTML = `
      <div class="vid-slot" id="slot-a">
        <span class="vid-label label-mp4">MP4</span>
        <video src="${escHtml(mp4)}" controls playsinline></video>
      </div>
      <button class="swap-btn" title="Поменять местами" onclick="swapSlots()">⇄</button>
      <div class="vid-slot" id="slot-b">
        <span class="vid-label label-yt">YOUTUBE</span>
        <iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    `;

    document.getElementById('setup').style.display = 'none';
    document.getElementById('player').classList.add('active');
  }

  function swapSlots() {
    const container = document.getElementById('videos');
    const a = document.getElementById('slot-a');
    const b = document.getElementById('slot-b');
    // swap DOM positions (swap btn stays in between)
    const swapBtn = container.querySelector('.swap-btn');
    container.insertBefore(b, swapBtn);
    container.appendChild(a);
    // re-id
    b.id = 'slot-a';
    a.id = 'slot-b';
    // swap labels
    const labelA = b.querySelector('.vid-label');
    const labelB = a.querySelector('.vid-label');
    [labelA.className, labelB.className] = [labelB.className, labelA.className];
    [labelA.textContent, labelB.textContent] = [labelB.textContent, labelA.textContent];
  }

  function goBack() {
    document.getElementById('player').classList.remove('active');
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('videos').innerHTML = '';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
